openapi: 3.1.0
info:
  title: Data Dashboard API
  version: 0.1.0
  description: >
    API for serving pre-analyzed CSV data. CSV files are processed offline by
    `analyze_csv_file.py` and the resulting JSON is stored in `data/`.

paths:
  /:
    get:
      summary: Root
      operationId: readRoot
      responses:
        "200":
          description: API status message
          content:
            application/json:
              schema:
                type: string
              example: "API is working. Visit /docs for API documentation."

  /models/:
    get:
      summary: Get available models
      operationId: getAvailableModels
      tags:
        - models
      responses:
        "200":
          description: List of available model names
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AvailableModels"

  /models/{model_name}:
    get:
      summary: Get model results
      operationId: getModelResults
      tags:
        - models
      parameters:
        - name: model_name
          in: path
          required: true
          description: Model name without the _results suffix (e.g. linear_regression)
          schema:
            type: string
            pattern: "^[A-Za-z0-9_-]+$"
          example: linear_regression
      responses:
        "200":
          description: Results for the requested model
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModelResult"
        "400":
          description: Invalid model name
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPError"
              example:
                detail: Invalid model name
        "404":
          description: Model not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPError"
              example:
                detail: Model not found

  /data/available-files:
    get:
      summary: Get available files
      operationId: getAvailableFiles
      tags:
        - data
      responses:
        "200":
          description: List of available file names without extension
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AvailableFiles"

  /data/{filename}:
    get:
      summary: Get analysis data
      operationId: getData
      tags:
        - data
      parameters:
        - name: filename
          in: path
          required: true
          description: File stem, without extension
          schema:
            type: string
            pattern: "^[A-Za-z0-9_-]+$"
          example: trein
      responses:
        "200":
          description: Full analysis result for the requested file
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalysisResult"
        "400":
          description: Invalid filename
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPError"
              example:
                detail: Invalid filename
        "404":
          description: File not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPError"
              example:
                detail: File not found

components:
  schemas:
    AvailableFiles:
      type: object
      required:
        - available_files
      properties:
        available_files:
          type: array
          items:
            type: string
          example:
            - trein

    AvailableModels:
      type: object
      required:
        - available_models
      properties:
        available_models:
          type: array
          items:
            type: string
          example:
            - linear_regression
            - decision_tree
            - random_forest

    ModelResult:
      type: object
      required:
        - model
      properties:
        model:
          type: string
          example: Multiple Linear Regression
        gemiddelde_vertraging:
          type: number
          format: float
          example: 0.85
        voorspelling:
          type: number
          format: float
          example: 0.85
        mae:
          type: number
          format: float
          example: 1.25
        rmse:
          type: number
          format: float
          example: 2.21
        r2:
          type: number
          format: float
          example: 0.046
        max_depth:
          type: integer
          description: Max depth (decision tree / random forest)
          example: 5
        n_estimators:
          type: integer
          description: Number of estimators (random forest)
          example: 10


    HTTPError:
      type: object
      required:
        - detail
      properties:
        detail:
          type: string

    FileMetadata:
      type: object
      required:
        - name
        - size_bytes
      properties:
        name:
          type: string
          example: trein.csv
        size_bytes:
          type: integer
          format: int64
          example: 2301393736

    DType:
      type: string
      enum:
        - string
        - numeric
        - boolean
        - datetime
        - categorical

    FrequencyEntry:
      type: object
      required:
        - value
        - count
        - rate
      properties:
        value:
          type: string
        count:
          type: integer
        rate:
          type: number
          format: float
          minimum: 0
          maximum: 1

    DistributionBucket:
      type: object
      required:
        - min
        - max
        - count
      properties:
        min:
          type: number
        max:
          type: number
        count:
          type: integer

    DayOfWeekEntry:
      type: object
      required:
        - day
        - count
      properties:
        day:
          type: string
          enum:
            - Monday
            - Tuesday
            - Wednesday
            - Thursday
            - Friday
            - Saturday
            - Sunday
        count:
          type: integer

    HourOfDayEntry:
      type: object
      required:
        - hour
        - count
      properties:
        hour:
          type: integer
          minimum: 0
          maximum: 23
        count:
          type: integer

    GapStats:
      type: object
      required:
        - min_seconds
        - max_seconds
        - mean_seconds
        - median_seconds
      properties:
        min_seconds:
          type: number
        max_seconds:
          type: number
        mean_seconds:
          type: number
        median_seconds:
          type: number

    ColumnStats:
      type: object
      required:
        - name
        - dtype
        - null_count
        - fill_rate
        - unique_count
        - top_values
      properties:
        name:
          type: string
          example: dienstregelpunt
        dtype:
          $ref: "#/components/schemas/DType"
        null_count:
          type: integer
          example: 0
        fill_rate:
          type: number
          format: float
          minimum: 0
          maximum: 1
          example: 0.9973
        unique_count:
          type: integer
          example: 695
        top_values:
          type: array
          maxItems: 5
          items:
            type: string
          example:
            - Ut
            - Ass
            - Shl
            - Asd
            - Rtd
        frequency:
          type: array
          items:
            $ref: "#/components/schemas/FrequencyEntry"
          description: Top value frequencies (string/categorical columns)
        min:
          type:
            - number
            - string
            - "null"
        max:
          type:
            - number
            - string
            - "null"
        mean:
          type:
            - number
            - "null"
        std:
          type:
            - number
            - "null"
        median:
          type:
            - number
            - "null"
        q1:
          type:
            - number
            - "null"
          description: First quartile (numeric columns)
        q3:
          type:
            - number
            - "null"
          description: Third quartile (numeric columns)
        iqr:
          type:
            - number
            - "null"
          description: Interquartile range (numeric columns)
        outlier_count:
          type:
            - integer
            - "null"
          description: Number of outliers (numeric columns)
        skewness:
          type:
            - number
            - "null"
          description: Skewness of the distribution (numeric columns)
        kurtosis:
          type:
            - number
            - "null"
          description: Kurtosis of the distribution (numeric columns)
        negative_count:
          type:
            - integer
            - "null"
          description: Number of negative values (numeric columns)
        zero_count:
          type:
            - integer
            - "null"
          description: Number of zero values (numeric columns)
        distribution:
          type: array
          items:
            $ref: "#/components/schemas/DistributionBucket"
          description: Histogram buckets (numeric columns)
        day_of_week:
          type: array
          items:
            $ref: "#/components/schemas/DayOfWeekEntry"
          description: Row counts per day of week (datetime columns)
        hour_of_day:
          type: array
          items:
            $ref: "#/components/schemas/HourOfDayEntry"
          description: Row counts per hour of day (datetime columns)
        gap_stats:
          $ref: "#/components/schemas/GapStats"
          description: Statistics on time gaps between consecutive values (datetime columns)

    AnalysisResult:
      type: object
      required:
        - file
        - columns
        - total_rows
        - total_columns
        - total_cells
        - total_nulls
        - overall_fill_rate
        - fully_complete_columns
        - rows_with_any_null
      properties:
        file:
          $ref: "#/components/schemas/FileMetadata"
        columns:
          type: array
          items:
            $ref: "#/components/schemas/ColumnStats"
        total_rows:
          type: integer
          example: 10000
        total_columns:
          type: integer
          example: 12
        total_cells:
          type: integer
          example: 120000
        total_nulls:
          type: integer
          example: 321
        overall_fill_rate:
          type: number
          format: float
          minimum: 0
          maximum: 1
          example: 0.9973
        fully_complete_columns:
          type: integer
          example: 9
        rows_with_any_null:
          type: integer
          example: 215